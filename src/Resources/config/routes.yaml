aropixel_page_index:
    path: /page/{type}/list
    controller: Aropixel\PageBundle\Controller\Default\IndexPageAction

aropixel_page_new:
    path: /page/{type}/new
    controller: Aropixel\PageBundle\Controller\Default\CreatePageAction

aropixel_page_edit:
    path: /page/{type}/{id}/edit
    controller: Aropixel\PageBundle\Controller\Default\EditPageAction

aropixel_page_delete:
    path: /page/{id}
    controller: Aropixel\PageBundle\Controller\Default\DeletePageAction

aropixel_page_status:
    path: /page/{id}/status
    controller: Aropixel\PageBundle\Controller\Default\StatusPageAction
